<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* START SCREEN */
.start-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #3a7bd5, #00d2ff);
    width: 100%;
    height: 100vh;
}

/* MAIN SCREEN */
.main-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #ffb6c1;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
}

/* BUTTON */
#revealBtn {
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #3a7bd5;
    font-size: clamp(16px, 2vw, 22px);
    cursor: pointer;
    font-weight: bold;
    box-shadow: 2px 4px 0px #0f2d5f;
}

/* BANNERS */
.banner {
    display: none;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: clamp(20px, 5vh, 40px);
    position: relative;
}

.banner::before {
    content: "";
    position: absolute;
    top: 18px;
    left: 5%;
    width: 90%;
    height: 30px;
    border-top: 3px solid #5a3e2b;
    border-radius: 50%;
}

.letter {
    background: #ff4d6d;
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: clamp(14px, 4vw, 22px);
    transform-origin: top center;
    animation: swing 2s infinite ease-in-out;
    position: relative;
    top: 10px;
}

.letter:nth-child(even) { background: #ff85a2; }

@keyframes swing {
    0% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
    100% { transform: rotate(-8deg); }
}

/* PHOTOS */
.photos {
    position: relative;
    width: 100%;
    height: 220px;
    margin-top: 40px;
}

.polaroid {
    width: 100px;
    padding: 5px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    animation: float 5s infinite ease-in-out;
    position: absolute;
}

.polaroid img {
    width: 100%;
    border-radius: 5px;
}

@keyframes float {
    50% { transform: translateY(-15px) rotate(var(--rotate)); }
}

.p1 { top: 0; left: 40%; --rotate: -4deg; }
.p2 { bottom: -60%; left: 5%; --rotate: 2deg; }
.p3 { bottom: -60%; right: 5%; --rotate: -4deg; }

.cake-section {
    margin-top: clamp(4px, 1vh, 12px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: absolute;
    bottom: -80%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
}

.cake-section {
    margin-top: clamp(4px, 1vh, 12px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 5;
}
.cake-svg { filter: drop-shadow(0 6px 16px rgba(180,60,100,0.3)); }
 
.glow-dot  { animation: glowPulse 1.8s infinite alternate ease-in-out; }
.glow-ring { animation: ringPulse 1.8s infinite alternate ease-in-out; }
@keyframes glowPulse { from { r:4; } to { r:5.5; } }
@keyframes ringPulse { from { r:8; opacity:0.2; } to { r:11; opacity:0.35; } }

/* BALLOONS */
.balloons {
    display: none;
    position: absolute;
    bottom: 0;
    z-index: 10;
    width: 100%;
    justify-content: space-around;
}

.balloon {
    width: 35px;
    height: 50px;
    border-radius: 50%;
    position: relative;
    animation: floatUp 6s infinite ease-in;
}

.balloon::after {
    content: "";
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 40px;
    background: #444;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
    }
    to {
        transform: translateY(-120vh);
    }
}

/* POPPERS */
.poppers {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
}

.pop {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    position: absolute;
    animation: burst 2s forwards;
    will-change: transform;
}

@keyframes burst {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    70%  { opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(0.3); opacity: 0; }
}

/* CONFETTI */
.confetti {
    position: fixed;
    top: -10px;
    width: 8px;
    height: 14px;
    animation: fall linear forwards;
    z-index: 9999;
    opacity: 0.9;
}

@keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) translateX(50px) rotate(720deg); opacity: 0; }
}

/* BACK BUTTON */
.back-btn {
    position: fixed;
    right: 20px;
    bottom: 40px;
    background: #e6c86e;
    padding: 12px 25px;
    border-radius: 25px;
    color: black;
    font-weight: bold;
    text-decoration: none;
    z-index: 9999;
    transform: translateZ(0);
    font-family: 'Courier New', monospace;
}
</style>
</head>

<body>
<div id="app" class="start-screen">
    <button id="revealBtn">🎁 Tap to Reveal</button>
</div>

<script>
// Use \u2764 (plain red heart, no variation selector) to avoid invisible extra characters
const desktopLine1 = "\u2764HAPPY BIRTHDAY";
const desktopLine2 = "VAISIYAA \u2764";

const mobileLine1 = "\u2764HAPPY";
const mobileLine2 = "BIRTHDAY";
const mobileLine3 = "VAISIYAA \u2764";

function createBannerLetters(text, container) {
    container.innerHTML = "";
    // Use Intl.Segmenter to correctly split by grapheme cluster (handles all emoji properly)
    const segmenter = new Intl.Segmenter(undefined, { granularity: "grapheme" });
    const segments = [...segmenter.segment(text)].map(s => s.segment);

    segments.forEach((char, i) => {
        if (char === " ") {
            const space = document.createElement("div");
            space.style.width = "4px";
            container.appendChild(space);
            return;
        }
        const div = document.createElement("div");
        div.className = "letter";
        div.textContent = char;
        div.style.animationDelay = (i * 0.1) + "s";
        container.appendChild(div);
    });
}

const app = document.getElementById("app");

document.getElementById("revealBtn").addEventListener("click", () => {
    app.className = "main-screen";

    app.innerHTML = `
        <div class="banner" id="banner1"></div>
        <div class="banner" id="banner2"></div>
        <div class="banner" id="banner3"></div>

        <div class="photos">
            <div class="polaroid p1"><img src="../images/photo7.jpg"></div>
            <div class="polaroid p2"><img src="../images/photo2.jpg"></div>
            <div class="polaroid p3"><img src="../images/photo6.jpg"></div>
            <div class="cake-section">
            <svg class="cake-svg" viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg"
                 style="width:clamp(110px,34vw,155px);height:auto;">
                <ellipse cx="110" cy="192" rx="88" ry="8" fill="rgba(0,0,0,0.10)"/>
                <rect x="18" y="140" width="184" height="52" rx="14" fill="#f9a8c9"/>
                <rect x="18" y="140" width="184" height="16" rx="10" fill="#f472b6"/>
                <ellipse cx="45"  cy="140" rx="11" ry="9" fill="white" opacity="0.9"/>
                <ellipse cx="75"  cy="138" rx="10" ry="8" fill="white" opacity="0.9"/>
                <ellipse cx="110" cy="139" rx="12" ry="9" fill="white" opacity="0.9"/>
                <ellipse cx="148" cy="138" rx="10" ry="8" fill="white" opacity="0.9"/>
                <ellipse cx="178" cy="140" rx="11" ry="9" fill="white" opacity="0.9"/>
                <circle cx="50"  cy="162" r="5"   fill="#ff4d6d" opacity="0.7"/>
                <circle cx="85"  cy="168" r="4"   fill="#ffd93d" opacity="0.8"/>
                <circle cx="120" cy="160" r="5"   fill="#6bcb77" opacity="0.7"/>
                <circle cx="155" cy="167" r="4"   fill="#4d96ff" opacity="0.8"/>
                <circle cx="185" cy="158" r="4"   fill="#ff85a2" opacity="0.8"/>
                <rect x="38" y="92" width="144" height="52" rx="12" fill="#fecdd3"/>
                <rect x="38" y="92" width="144" height="14" rx="8"  fill="#fb7185"/>
                <ellipse cx="60"  cy="92" rx="10" ry="8" fill="white" opacity="0.9"/>
                <ellipse cx="90"  cy="90" rx="10" ry="8" fill="white" opacity="0.9"/>
                <ellipse cx="120" cy="91" rx="11" ry="9" fill="white" opacity="0.9"/>
                <ellipse cx="152" cy="90" rx="10" ry="8" fill="white" opacity="0.9"/>
                <circle cx="68"  cy="112" r="4"   fill="#9b5de5" opacity="0.7"/>
                <circle cx="100" cy="118" r="4"   fill="#ff4d6d" opacity="0.7"/>
                <circle cx="135" cy="111" r="4"   fill="#ffd93d" opacity="0.8"/>
                <circle cx="165" cy="116" r="3.5" fill="#6bcb77" opacity="0.7"/>
                <rect x="62" y="52" width="96" height="44" rx="10" fill="#ffe4e6"/>
                <rect x="62" y="52" width="96" height="12" rx="7"  fill="#fda4af"/>
                <ellipse cx="82"  cy="52" rx="9"  ry="7" fill="white" opacity="0.9"/>
                <ellipse cx="110" cy="50" rx="10" ry="8" fill="white" opacity="0.9"/>
                <ellipse cx="140" cy="52" rx="9"  ry="7" fill="white" opacity="0.9"/>
                <text x="80"  y="76" font-size="10" fill="#ffd93d">&#9733;</text>
                <text x="107" y="80" font-size="8"  fill="#ff4d6d">&#9733;</text>
                <text x="132" y="74" font-size="10" fill="#6bcb77">&#9733;</text>
                <rect x="82"  y="34" width="10" height="20" rx="3" fill="#ffd93d"/>
                <rect x="82"  y="34" width="10" height="8"  rx="2" fill="#f59e0b" opacity="0.5"/>
                <line x1="87" y1="34" x2="87" y2="29" stroke="#555" stroke-width="1.2"/>
                <circle class="glow-ring" cx="87" cy="27" r="8" fill="#ffb347" opacity="0.25"/>
                <circle class="glow-dot"  cx="87" cy="27" r="4" fill="#ffb347"/>
                <rect x="105" y="30" width="10" height="24" rx="3" fill="#ff85a2"/>
                <rect x="105" y="30" width="10" height="8"  rx="2" fill="#f43f5e" opacity="0.5"/>
                <line x1="110" y1="30" x2="110" y2="25" stroke="#555" stroke-width="1.2"/>
                <circle class="glow-ring" cx="110" cy="23" r="8" fill="#ffb347" opacity="0.25" style="animation-delay:0.6s"/>
                <circle class="glow-dot"  cx="110" cy="23" r="4" fill="#ffb347" style="animation-delay:0.6s"/>
                <rect x="128" y="34" width="10" height="20" rx="3" fill="#6bcb77"/>
                <rect x="128" y="34" width="10" height="8"  rx="2" fill="#22c55e" opacity="0.5"/>
                <line x1="133" y1="34" x2="133" y2="29" stroke="#555" stroke-width="1.2"/>
                <circle class="glow-ring" cx="133" cy="27" r="8" fill="#ffb347" opacity="0.25" style="animation-delay:1.2s"/>
                <circle class="glow-dot"  cx="133" cy="27" r="4" fill="#ffb347" style="animation-delay:1.2s"/>
            </svg>
        </div>   
        <div class="balloons">
            <div class="balloon"></div>
            <div class="balloon"></div>
            <div class="balloon"></div>
        </div>

        <div class="poppers"></div>

        <a href="../envelopes.html" id="backBtn" class="back-btn">BACK ◀</a>
    `;

    const b1 = document.getElementById("banner1");
    const b2 = document.getElementById("banner2");
    const b3 = document.getElementById("banner3");

    function setupBanner() {
        if (window.innerWidth <= 600) {
            createBannerLetters(mobileLine1, b1);
            createBannerLetters(mobileLine2, b2);
            createBannerLetters(mobileLine3, b3);
            b1.style.display = "flex";
            b2.style.display = "flex";
            b3.style.display = "flex";
        } else {
            createBannerLetters(desktopLine1, b1);
            createBannerLetters(desktopLine2, b2);
            b1.style.display = "flex";
            b2.style.display = "flex";
            b3.style.display = "none";
        }
    }

    setupBanner();
    window.addEventListener("resize", setupBanner);

    // Balloons with random colors
    const balloonColors = [
        "#ff4d6d", "#ffd93d", "#6bcB77",
        "#4d96ff", "#ff85a2", "#ff9f1c",
        "#9b5de5", "#00bbf9"
    ];

    document.querySelector(".balloons").style.display = "flex";
    document.querySelectorAll(".balloon").forEach(balloon => {
        balloon.style.backgroundColor =
            balloonColors[Math.floor(Math.random() * balloonColors.length)];
        balloon.style.animationDuration = (Math.random() * 5 + 8) + "s";
    });

    // POPPERS
    function createPopper(x, y) {
        const container = document.querySelector(".poppers");
        const colors = ["#ff4d6d", "#ffd93d", "#6bcB77", "#4d96ff", "#ff85a2"];
        for (let i = 0; i < 15; i++) {
            const pop = document.createElement("div");
            pop.classList.add("pop");
            pop.style.left = x + "px";
            pop.style.top = y + "px";
            pop.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            const angle = Math.random() * 2 * Math.PI;
            const dist = Math.random() * 100;
            pop.style.setProperty("--x", Math.cos(angle) * dist + "px");
            pop.style.setProperty("--y", Math.sin(angle) * dist + "px");
            container.appendChild(pop);
            setTimeout(() => pop.remove(), 1200);
        }
    }

    setInterval(() => {
        createPopper(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
    }, 1000);

    // CONFETTI
    function createConfetti() {
        const colors = ["#ff4d6d", "#ffd93d", "#6bcB77", "#4d96ff", "#ff85a2"];
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * window.innerWidth + "px";
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        const size = Math.random() * 6 + 4;
        c.style.width = size + "px";
        c.style.height = size * 1.5 + "px";
        c.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }

    setInterval(() => {
        for (let i = 0; i < 3; i++) createConfetti();
    }, 500);
});
</script>
</body>
</html>
