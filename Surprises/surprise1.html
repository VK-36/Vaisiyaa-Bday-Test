<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* START SCREEN */
.start-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #3a7bd5, #00d2ff);
    width: 100%;
    height: 100vh;
}

/* MAIN SCREEN */
.main-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #ffb6c1;
    min-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
}

/* BUTTON */
#revealBtn {
    padding: 12px 25px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #3a7bd5;
    font-size: clamp(16px, 2vw, 22px);
    cursor: pointer;
    font-weight: bold;
    box-shadow: 2px 4px 0px #0f2d5f;
}

/* BANNERS */
.banner {
    display: none;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: clamp(20px, 5vh, 40px);
    position: relative;
}

.banner::before {
    content: "";
    position: absolute;
    top: 18px;
    left: 5%;
    width: 90%;
    height: 30px;
    border-top: 3px solid #5a3e2b;
    border-radius: 50%;
}

.letter {
    background: #ff4d6d;
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: clamp(14px, 4vw, 22px);
    transform-origin: top center;
    animation: swing 2s infinite ease-in-out;
    position: relative;
    top: 10px;
}

.letter:nth-child(even) { background: #ff85a2; }

@keyframes swing {
    0% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
    100% { transform: rotate(-8deg); }
}

/* PHOTOS */
.photos {
    position: relative;
    width: 100%;
    height: 220px;
    margin-top: 40px;
}

.polaroid {
    width: 100px;
    padding: 5px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    animation: float 5s infinite ease-in-out;
    position: absolute;
}

.polaroid img {
    width: 100%;
    border-radius: 5px;
}

@keyframes float {
    50% { transform: translateY(-15px) rotate(var(--rotate)); }
}

.p1 { top: 0; left: 40%; --rotate: -4deg; }
.p2 { bottom: -60%; left: 20%; --rotate: 2deg; }
.p3 { bottom: -60%; right: 20%; --rotate: -4deg; }

/* BALLOONS */
.balloons {
    display: none;
    position: absolute;
    bottom: 0;
    z-index: 10;
    width: 100%;
    justify-content: space-around;
}

.balloon {
    width: 35px;
    height: 50px;
    border-radius: 50%;
    position: relative;
    animation: floatUp 6s infinite ease-in;
}

.balloon::after {
    content: "";
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 40px;
    background: #444;
}

@keyframes floatUp {
    to { transform: translateY(-120vh); opacity: 1; }
}

/* POPPERS */
.poppers {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
}

.pop {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    position: absolute;
    animation: burst 2s forwards;
    will-change: transform;
}

@keyframes burst {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    70%  { opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(0.3); opacity: 0; }
}

/* CONFETTI */
.confetti {
    position: fixed;
    top: -10px;
    width: 8px;
    height: 14px;
    animation: fall linear forwards;
    z-index: 9999;
    opacity: 0.9;
}

@keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) translateX(50px) rotate(720deg); opacity: 0; }
}

/* BACK BUTTON */
.back-btn {
    position: fixed;
    right: 20px;
    bottom: 40px;
    background: #e6c86e;
    padding: 12px 25px;
    border-radius: 25px;
    color: black;
    font-weight: bold;
    text-decoration: none;
    z-index: 9999;
    transform: translateZ(0);
    font-family: 'Courier New', monospace;
}
</style>
</head>

<body>
<div id="app" class="start-screen">
    <button id="revealBtn">🎁 Tap to Reveal</button>
</div>

<script>
// Use \u2764 (plain red heart, no variation selector) to avoid invisible extra characters
const desktopLine1 = "\u2764HAPPY BIRTHDAY";
const desktopLine2 = "VAISIYAA \u2764";

const mobileLine1 = "\u2764HAPPY";
const mobileLine2 = "BIRTHDAY";
const mobileLine3 = "VAISIYAA \u2764";

function createBannerLetters(text, container) {
    container.innerHTML = "";
    // Use Intl.Segmenter to correctly split by grapheme cluster (handles all emoji properly)
    const segmenter = new Intl.Segmenter(undefined, { granularity: "grapheme" });
    const segments = [...segmenter.segment(text)].map(s => s.segment);

    segments.forEach((char, i) => {
        if (char === " ") {
            const space = document.createElement("div");
            space.style.width = "4px";
            container.appendChild(space);
            return;
        }
        const div = document.createElement("div");
        div.className = "letter";
        div.textContent = char;
        div.style.animationDelay = (i * 0.1) + "s";
        container.appendChild(div);
    });
}

const app = document.getElementById("app");

document.getElementById("revealBtn").addEventListener("click", () => {
    app.className = "main-screen";

    app.innerHTML = `
        <div class="banner" id="banner1"></div>
        <div class="banner" id="banner2"></div>
        <div class="banner" id="banner3"></div>

        <div class="photos">
            <div class="polaroid p1"><img src="../images/photo7.jpg"></div>
            <div class="polaroid p2"><img src="../images/photo2.jpg"></div>
            <div class="polaroid p3"><img src="../images/photo6.jpg"></div>
        </div>

        <div class="balloons">
            <div class="balloon"></div>
            <div class="balloon"></div>
            <div class="balloon"></div>
        </div>

        <div class="poppers"></div>

        <a href="../envelopes.html" id="backBtn" class="back-btn">BACK ◀</a>
    `;

    const b1 = document.getElementById("banner1");
    const b2 = document.getElementById("banner2");
    const b3 = document.getElementById("banner3");

    function setupBanner() {
        if (window.innerWidth <= 600) {
            createBannerLetters(mobileLine1, b1);
            createBannerLetters(mobileLine2, b2);
            createBannerLetters(mobileLine3, b3);
            b1.style.display = "flex";
            b2.style.display = "flex";
            b3.style.display = "flex";
        } else {
            createBannerLetters(desktopLine1, b1);
            createBannerLetters(desktopLine2, b2);
            b1.style.display = "flex";
            b2.style.display = "flex";
            b3.style.display = "none";
        }
    }

    setupBanner();
    window.addEventListener("resize", setupBanner);

    // Balloons with random colors
    const balloonColors = [
        "#ff4d6d", "#ffd93d", "#6bcB77",
        "#4d96ff", "#ff85a2", "#ff9f1c",
        "#9b5de5", "#00bbf9"
    ];

    document.querySelector(".balloons").style.display = "flex";
    document.querySelectorAll(".balloon").forEach(balloon => {
        balloon.style.backgroundColor =
            balloonColors[Math.floor(Math.random() * balloonColors.length)];
        balloon.style.animationDuration = (Math.random() * 3 + 4) + "s";
    });

    // POPPERS
    function createPopper(x, y) {
        const container = document.querySelector(".poppers");
        const colors = ["#ff4d6d", "#ffd93d", "#6bcB77", "#4d96ff", "#ff85a2"];
        for (let i = 0; i < 15; i++) {
            const pop = document.createElement("div");
            pop.classList.add("pop");
            pop.style.left = x + "px";
            pop.style.top = y + "px";
            pop.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            const angle = Math.random() * 2 * Math.PI;
            const dist = Math.random() * 100;
            pop.style.setProperty("--x", Math.cos(angle) * dist + "px");
            pop.style.setProperty("--y", Math.sin(angle) * dist + "px");
            container.appendChild(pop);
            setTimeout(() => pop.remove(), 1200);
        }
    }

    setInterval(() => {
        createPopper(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
    }, 1000);

    // CONFETTI
    function createConfetti() {
        const colors = ["#ff4d6d", "#ffd93d", "#6bcB77", "#4d96ff", "#ff85a2"];
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * window.innerWidth + "px";
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        const size = Math.random() * 6 + 4;
        c.style.width = size + "px";
        c.style.height = size * 1.5 + "px";
        c.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }

    setInterval(() => {
        for (let i = 0; i < 3; i++) createConfetti();
    }, 500);
});
</script>
</body>
</html>
