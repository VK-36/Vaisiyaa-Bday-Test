<!DOCTYPE html>
<html>
<head>
    <title>Vaisiyaa Bday</title>
    <style>
        body { font-family: Arial; text-align: center; background: #fff0f5; margin: 0; }
        .title { margin-top: 50px; color: #ff4d88; }
        .instruction { margin-top: 10px; color: #555; font-size: 14px; opacity: 0.8; }
        .grid { display: grid; grid-template-columns: repeat(2, 180px); gap: 40px; justify-content: center; margin-top: 60px; }
        .grid .card:nth-child(1) { grid-column: span 2; justify-self: center; }
        .card { width: 180px; height: 120px; background: #fff; position: relative; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); cursor: pointer; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; border-left: 90px solid transparent; border-right: 90px solid transparent; border-top: 60px solid #ffb6c1; }
        .card span { position: absolute; bottom: 15px; left: 0; right: 0; color: #ff4d88; font-weight: bold; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<h1 class="title">For My Bestieee 💕</h1>
<p class="instruction">Click any envelope to continue</p>
<div class="grid">
    <div class="card" onclick="goToPage('Surprises/surprise1.html')"><span>Surprise 1</span></div>
    <div class="card" onclick="goToPage('Surprises/surprise2.html')"><span>Surprise 2</span></div>
    <div class="card" onclick="goToPage('Surprises/surprise3.html')"><span>Surprise 3</span></div>
</div>
<script>
    if (new Date() < new Date('2026-10-22T00:00:00')) {
        window.location.replace('index.html');
    }
    function goToPage(page) { window.location.href = page; }
</script>
</body>
</html>
