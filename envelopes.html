<!DOCTYPE html>
<html>
<head>
    <title>Vaisiyaa Bday</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #fff0f5;
            margin: 0;

            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .title {
            margin-top: 50px;
            color: #ff4d88;
            font-size: 2rem;
        }

        .instruction {
            margin-top: 10px;
            color: #555;
            font-size: 1rem;
            opacity: 0.8;
        }

        /* MAIN LAYOUT */
        .grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* equal vertical spacing */
            margin: 30px 20px;
        }

        /* Bottom row */
        .bottom {
            display: flex;
            justify-content: center;
            gap: 40px; /* equal spacing between bottom cards */
            flex-wrap: wrap;
        }

        /* CARD STYLE */
        .card {
            width: 180px;
            height: 100px;
            background: #fff;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            cursor: pointer;
            overflow: hidden;

            display: flex;
            align-items: flex-end;
            justify-content: center;

            padding-bottom: 15px;

            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* Envelope flap */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 90px solid transparent;
            border-right: 90px solid transparent;
            border-top: 60px solid #ffb6c1;
        }

        /* Text */
        .card span {
            color: #ff4d88;
            font-weight: bold;
            z-index: 1;
        }

        /* Hover */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .bottom {
                gap: 30px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
                margin-top: 30px;
            }

            .instruction {
                font-size: 0.85rem;
            }

            .bottom {
                flex-direction: column;
                gap: 25px;
            }
        }
    </style>
</head>

<body>

<h1 class="title">For My Bestieee 💕</h1>
<p class="instruction">Click any envelope to open</p>

<div class="grid">

    <!-- Top -->
    <div class="card" onclick="goToPage('Surprises/surprise1.html')">
        <span>Surprise 1</span>
    </div>

    <!-- Bottom -->
    <div class="bottom">
        <div class="card" onclick="goToPage('Surprises/surprise2.html')">
            <span>Surprise 2</span>
        </div>

        <div class="card" onclick="goToPage('Surprises/surprise3.html')">
            <span>Surprise 3</span>
        </div>
    </div>

</div>
<script>
    if (new Date() < new Date('2026-06-03T17:05:00')) {
        window.location.replace('index.html');
    }
    function goToPage(page) { window.location.href = page; }
</script>
</body>
</html>
